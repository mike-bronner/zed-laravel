name: CI

on:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  laravel-lsp:
    name: LSP — test, fmt, clippy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: laravel-lsp
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: laravel-lsp

      - name: Bootstrap test fixture .env
        # `test-project/.env` is gitignored, but the integration tests
        # under `laravel-lsp/tests/integration_tests.rs` need one to
        # exercise env parsing + variable extraction.
        working-directory: .
        run: cp test-project/.env.example test-project/.env

      - name: Setup PHP for test fixture
        uses: shivammathur/setup-php@v2
        with:
          # 8.4 matches the actual minimum required by the locked
          # vendor packages (symfony/* v8.0 requires >= 8.4).
          php-version: '8.4'

      - name: Install test-project Composer dependencies
        # `test-project/vendor/` AND `composer.lock` are gitignored — the
        # lock is intentionally untracked so its transitive deps don't
        # surface Dependabot alerts for a fixture that never ships. We use
        # `composer update` (not `install`) to resolve + write a fresh lock
        # on the runner from `composer.json`. The route-discovery integration
        # tests need real vendor packages (e.g. Fortify) on disk to exercise
        # package-priority routing. `--no-dev` skips Pest and PHPUnit — we
        # don't run PHP tests here, just exercise the on-disk vendor layout.
        working-directory: test-project
        run: composer update --no-interaction --prefer-dist --no-progress --no-dev

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --all-features

  extension:
    name: Extension — wasm check, fmt, clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --target wasm32-wasip2 -- -D warnings

      - name: cargo check
        run: cargo check --target wasm32-wasip2
