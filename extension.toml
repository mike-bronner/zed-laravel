id = "laravel"
name = "Laravel"
description = "Laravel development support for Zed with go-to-definition for Blade, Livewire, and Flux components. Install the separate Blade extension for syntax highlighting."
version = "0.2.2"
schema_version = 1
authors = ["Mike Bronner <mike.bronner@icloud.com>"]
repository = "https://github.com/mike-bronner/zed-laravel"

[lib]
kind = "Rust"
version = "0.2.2"

[language_servers.laravel-lsp]
name = "Laravel"
# XML: for phpunit.xml env var autocomplete
# Shell Script: Zed treats .env files as Shell Script (see bash/config.toml path_suffixes)
languages = ["PHP", "Blade", "XML", "Shell Script"]
